<script defer>
async function cargar() {

    try {

        let res = await fetch("/pedidos");
        let data = await res.json();

        console.log("PEDIDOS:", data);

        document.getElementById("nuevo").innerHTML = "";
        document.getElementById("preparando").innerHTML = "";
        document.getElementById("enviado").innerHTML = "";
        document.getElementById("entregado").innerHTML = "";

        data.forEach(p => {

            let html = `
                <div class="pedido">
                    <b>#${p.folio}</b><br>
                    ${p.cliente}<br>
                    💰 $${p.total}<br>

                    <button class="prep" onclick="estado(${p.folio}, 'preparando')">Preparando</button>
                    <button class="env" onclick="estado(${p.folio}, 'enviado')">Enviar</button>
                    <button class="ent" onclick="estado(${p.folio}, 'entregado')">Entregar</button>
                </div>
            `;

            if (p.estado === "nuevo") {
                document.getElementById("nuevo").innerHTML += html;
            } else if (p.estado === "preparando") {
                document.getElementById("preparando").innerHTML += html;
            } else if (p.estado === "enviado") {
                document.getElementById("enviado").innerHTML += html;
            } else {
                document.getElementById("entregado").innerHTML += html;
            }

        });

        // STATS
        let s = await fetch("/stats");
        let stats = await s.json();

        document.getElementById("ventas").innerText = stats.ventas;
        document.getElementById("pedidos").innerText = stats.pedidos;
        document.getElementById("prep").innerText = stats.preparando;
        document.getElementById("env").innerText = stats.enviados;

    } catch (e) {
        console.error("ERROR PANEL:", e);
    }
}

function estado(id, estadoPedido) {
    fetch(/estado/${id}/${estadoPedido})
        .then(() => cargar());
}

setInterval(cargar, 3000);
cargar();
</script>
