<!DOCTYPE html>
<html>
<head>
<title>Panel PRO Restaurante</title>

<style>
body{
    font-family:Arial;
    background:#f5f5f5;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{margin:20px;}

.topbar{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.stats{
    display:flex;
    justify-content:space-around;
    gap:15px;
    flex-wrap:wrap;
}

.card{
    background:white;
    padding:15px;
    border-radius:10px;
    width:160px;
}

.columns{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.col{
    width:23%;
    min-width:250px;
}

.pedido{
    background:white;
    margin:10px;
    padding:12px;
    border-radius:10px;
    border-left:5px solid transparent;
}

.nuevo{ border-left:5px solid red; }
.preparando{ border-left:5px solid orange; }
.enviado{ border-left:5px solid blue; }
.entregado{ border-left:5px solid green; }

.detalle{
    font-size:12px;
    text-align:left;
    margin-top:5px;
}

button{
    margin:4px;
    padding:7px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.prep{background:orange;}
.env{background:#0066ff;color:white;}
.ent{background:green;color:white;}
.add{background:black;color:white;}
.clean{background:#999;color:white;}

.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,.5);
}

.modal-box{
    background:white;
    width:90%;
    max-width:420px;
    margin:60px auto;
    padding:20px;
    border-radius:12px;
}

input,select{
    padding:8px;
    margin:5px;
    width:90%;
}

/* 🔔 NOTIFICACIÓN */
.toast{
    position:fixed;
    top:20px;
    right:20px;
    background:black;
    color:white;
    padding:12px;
    border-radius:8px;
    display:none;
}
</style>
</head>

<body>

<h1>🔥 PANEL RESTAURANTE 🔥</h1>

<div class="topbar">
<button class="add" onclick="abrirModal()">➕ Pedido Manual</button>
<button class="clean" onclick="limpiar()">🧹 Limpiar</button>
</div>

<div class="stats">
<div class="card">Ventas: <span id="ventas">0</span></div>
<div class="card">Pedidos: <span id="pedidos">0</span></div>
<div class="card">Preparando: <span id="prep">0</span></div>
<div class="card">Enviados: <span id="env">0</span></div>
</div>

<div class="columns">
<div class="col"><h3>🆕 Nuevos</h3><div id="nuevo"></div></div>
<div class="col"><h3>🍳 Preparando</h3><div id="preparando"></div></div>
<div class="col"><h3>🚚 Enviados</h3><div id="enviado"></div></div>
<div class="col"><h3>✅ Entregados</h3><div id="entregado"></div></div>
</div>

<!-- 🔔 SONIDO -->
<audio id="audio" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<!-- 🔔 TOAST -->
<div class="toast" id="toast">🆕 Nuevo pedido</div>

<!-- MODAL (igual al tuyo) -->
<div class="modal" id="modal">
<div class="modal-box">

<h3>Nuevo Pedido</h3>

<div id="cliente_step">
<input id="cliente" placeholder="Nombre">
<input id="telefono" placeholder="Teléfono">
<input id="direccion" placeholder="Dirección">
<button onclick="irMenu()">Ir al menú ➡️</button>
</div>

<div id="menu_step" style="display:none;">
<button onclick="mostrar('platillos')">🍽 Platillos</button>
<button onclick="mostrar('bebidas')">🥤 Bebidas</button>
<br><br>
<button onclick="volverCliente()">⬅ Volver</button>
</div>

<div id="productos_step" style="display:none;">
<h4 id="tipo"></h4>
<select id="producto"></select>
<input id="cantidad" type="number" value="1">
<button onclick="agregar()">➕ Agregar</button>
<br><br>
<button onclick="volverMenu()">⬅ Regresar</button>
</div>

<div id="resumen"></div>

<button class="prep" onclick="guardar()">Guardar Pedido</button>
<button onclick="cerrarModal()">Cerrar</button>

</div>
</div>

<script>

let carrito=[];
let ultimoTotal=0;

const MENU={
platillos:{
"Ceviche Pescado":180,
"Ceviche Camarón":200,
"Aguachile Verde":190,
"Coctel Mixto":220
},
bebidas:{
"Coca Cola":30,
"Pepsi":25
}
};

function abrirModal(){ modal.style.display="block"; }
function cerrarModal(){ modal.style.display="none"; carrito=[]; updateResumen(); }

function irMenu(){ cliente_step.style.display="none"; menu_step.style.display="block"; }
function volverCliente(){ menu_step.style.display="none"; cliente_step.style.display="block"; }

function mostrar(tipo){
menu_step.style.display="none";
productos_step.style.display="block";

producto.innerHTML="";
for(let i in MENU[tipo]){
producto.innerHTML+=`<option value="${MENU[tipo][i]}">${i} - $${MENU[tipo][i]}</option>`;
}
tipo.innerText=tipo;
}

function volverMenu(){
productos_step.style.display="none";
menu_step.style.display="block";
}

function agregar(){
let nombre=producto.options[producto.selectedIndex].text;
let precio=parseInt(producto.value);
let cantidad=parseInt(document.getElementById("cantidad").value);

carrito.push({nombre,precio,cantidad});
updateResumen();
}

function updateResumen(){
let html="<b>Pedido:</b><br>";
let total=0;

carrito.forEach(p=>{
html+=`${p.nombre} x${p.cantidad}<br>`;
total+=p.precio*p.cantidad;
});

html+=`<br><b>Total: $${total.toLocaleString()}</b>`;
resumen.innerHTML=html;
}

async function guardar(){

let cliente=document.getElementById("cliente").value;
let telefono=document.getElementById("telefono").value;

if(!cliente || !telefono){
alert("Faltan datos");
return;
}

let direccion=document.getElementById("direccion").value;

let total=0;
carrito.forEach(p=> total+=p.precio*p.cantidad);

await fetch("/nuevo_manual",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({cliente,telefono,direccion,total,items:carrito})
});

alert("✅ Pedido creado");
cerrarModal();
cargar();
}

async function cargar(){

let res=await fetch("/pedidos");
let data=await res.json();

// 🔔 NUEVO PEDIDO
if(data.length > ultimoTotal){
audio.play();
toast.style.display="block";
setTimeout(()=>toast.style.display="none",2000);
}
ultimoTotal=data.length;

nuevo.innerHTML="";
preparando.innerHTML="";
enviado.innerHTML="";
entregado.innerHTML="";

data.forEach(p=>{

let clase=p.estado;

let botones="";
if(p.estado=="nuevo"){
botones=`<button class="prep" onclick="estado(${p.folio},'preparando')">Preparando</button>`;
}
else if(p.estado=="preparando"){
botones=`<button class="env" onclick="estado(${p.folio},'enviado')">Enviar</button>`;
}
else if(p.estado=="enviado"){
botones=`<button class="ent" onclick="estado(${p.folio},'entregado')">Entregar</button>`;
}
else{
botones=`<small>Finalizado</small>`;
}

let detalle="";
p.detalle?.forEach(i=>{
detalle+=`${i.nombre} x${i.cantidad}<br>`;
});

let html=`
<div class="pedido ${clase}">
<b>#${p.folio}</b><br>
${p.cliente}<br>
📞 ${p.telefono || ""}<br>
📍 ${p.direccion || ""}<br>
💰 $${p.total.toLocaleString()}<br>
<div class="detalle">${detalle}</div>
${botones}
</div>
`;

if(p.estado=="nuevo") nuevo.innerHTML+=html;
else if(p.estado=="preparando") preparando.innerHTML+=html;
else if(p.estado=="enviado") enviado.innerHTML+=html;
else entregado.innerHTML+=html;

});

let s=await fetch("/stats");
let stats=await s.json();

ventas.innerText=stats.ventas.toLocaleString();
pedidos.innerText=stats.pedidos;
prep.innerText=stats.preparando;
env.innerText=stats.enviados;

}

function estado(id,e){
fetch(`/estado/${id}/${e}`).then(()=>cargar());
}

async function limpiar(){
let res=await fetch("/pedidos");
let data=await res.json();

for(let p of data){
if(p.estado=="entregado"){
await fetch(`/estado/${p.folio}/finalizado`);
}
}
cargar();
}

setInterval(cargar,3000);
cargar();

</script>

</body>
</html>
