<!DOCTYPE html>
<html>
<head>
    <title>Panel</title>
</head>
<body>
    <h1>🔥 PANEL FUNCIONANDO 🔥</h1>

    {% for p in pedidos %}
        <div style="border:1px solid #ccc; margin:10px; padding:10px;">
            <b>Pedido:</b> {{p.folio}} <br>
            <b>Cliente:</b> {{p.cliente}} <br>
            <b>Total:</b> ${{p.total}} <br>
            <b>Estado:</b> {{p.estado}}
        </div>
    {% endfor %}
</body>
</html>
